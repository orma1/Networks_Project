server:
  bind_ip: 127.0.0.2
  bind_port: 53
  buffer_size: 4096
upstream:
  root_server_ip: 127.0.0.3
  root_server_port: 53
  public_forwarder: 8.8.8.8
  public_port: 53
behavior:
  default_ttl: 60
  timeout: 2.0
  enable_logging: true
storage:
  cache_file: resolver/data/dns_cache.db
  save_interval: 10
  cache_capacity: 1000
